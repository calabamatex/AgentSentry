name: Publish to npm

on:
  release:
    types: [published]

permissions: read-all

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: agent-sentry/package-lock.json
      - run: cd agent-sentry && npm ci
      - run: cd agent-sentry && npm run build
      - run: cd agent-sentry && npm test
      - run: cd agent-sentry && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
